<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allin - Aprende Quechua</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Deshabilitar selección de texto */
        body { user-select: none; }
        
        /* Efectos 3D tipo Duolingo */
        .btn-duo {
            transition: all 0.1s ease;
            box-shadow: 0 4px 0 #e46fde;
        }
        .btn-duo:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #d947ec;
        }
        .btn-gray {
            box-shadow: 0 4px 0 hsl(175, 76%, 81%);
        }
        .btn-gray:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #4c67c2;
        }
        .word-btn, .btn-interactivo {
            transition: all 0.1s ease;
        }
        .btn-interactivo:active {
            transform: translateY(3px);
            box-shadow: none !important;
        }
        
        /* Nodos del mapa de niveles */
        .nodo-nivel {
            width: 84px;
            height: 84px;
            border-radius: 9999px;
            border: 5px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s ease;
        }
        .nodo-nivel:active {
            transform: translateY(6px);
            box-shadow: none !important;
        }
        .nodo-nivel:hover {
            filter: brightness(1.05);
        }

        /* Styles para Pares con Audio */
        #pantalla-audio-pares {
            --ap-bg: #12181f;
            --ap-card: #1c2530;
            --ap-card-border: #3a4655;
            --ap-card-selected: #2a9df4;
            --ap-card-correct: #3ecf6e;
            --ap-card-wrong: #e5484d;
            --ap-muted: #7d8896;
            --ap-accent: #2fb8ff;
            --ap-pink: #ff3d81;
        }
        .ap-screen { width: 100%; max-width: 420px; margin: 0 auto; padding: 24px 16px 40px; }
        .ap-topbar { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
        .ap-close-btn { background: none; border: none; color: var(--ap-muted); font-size: 26px; cursor: pointer; line-height: 1; padding: 4px; }
        .ap-progress-track { flex: 1; height: 10px; background: #2a323d; border-radius: 999px; overflow: hidden; }
        .ap-progress-fill { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, #28d5f0, #2a9df4); transition: width .3s ease; }
        .ap-hearts { display: flex; align-items: center; gap: 6px; color: var(--ap-pink); font-weight: 800; font-size: 18px; }
        .ap-bolt { width: 20px; height: 20px; background: var(--ap-pink); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #1c0d14; }
        .ap-title { font-size: 26px; font-weight: 800; margin: 0 0 32px; color: #f2f5f8; }
        .ap-pairs { display: flex; flex-direction: column; gap: 14px; margin-bottom: 32px; }
        .ap-row { display: flex; gap: 12px; }
        .ap-tile { flex: 1; min-height: 64px; border-radius: 14px; border: 2px solid var(--ap-card-border); background: var(--ap-card); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0 16px; transition: border-color .15s ease, background .15s ease, transform .1s ease; user-select: none; -webkit-tap-highlight-color: transparent; }
        .ap-tile:active { transform: scale(0.98); }
        .ap-tile.ap-selected { border-color: var(--ap-card-selected); }
        .ap-tile.ap-correct { border-color: var(--ap-card-correct); background: #173327; }
        .ap-tile.ap-wrong { border-color: var(--ap-card-wrong); background: #331a1c; animation: ap-shake .3s; }
        .ap-tile.ap-matched { opacity: 0.45; cursor: default; }
        @keyframes ap-shake { 0%,100%{ transform: translateX(0); } 25%{ transform: translateX(-4px); } 75%{ transform: translateX(4px); } }
        .ap-audio-tile { justify-content: flex-start; gap: 10px; }
        .ap-play-icon { flex: none; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; color: var(--ap-accent); }
        .ap-play-icon svg { width: 20px; height: 20px; }
        .ap-waveform { flex: 1; height: 22px; display: flex; align-items: center; gap: 3px; overflow: hidden; }
        .ap-waveform span { width: 3px; border-radius: 2px; background: var(--ap-accent); opacity: .85; }
        .ap-word-tile { font-size: 18px; font-weight: 700; color: #f2f5f8; }
        .ap-check-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 800; font-size: 15px; letter-spacing: .04em; text-transform: uppercase; cursor: pointer; background: #2c3641; color: #6d7987; transition: background .2s, color .2s; }
        .ap-check-btn.ap-active { background: var(--ap-accent); color: #062033; cursor: pointer; }
    </style>
</head>
<body id="body-app" class="bg-white font-sans text-gray-800 flex flex-col min-h-screen transition-colors duration-300">

    <!-- MAPA DE NIVELES -->
    <div id="pantalla-mapa" class="flex flex-col flex-grow bg-gradient-to-b from-sky-50 to-white">
        <header class="p-5 border-b-2 border-gray-100 sticky top-0 bg-white/90 backdrop-blur z-50">
            <h1 class="text-2xl font-extrabold text-gray-700 text-center">Ruta de aprendizaje</h1>
            <p class="text-center text-gray-400 text-sm font-medium">Quechua para principiantes</p>
        </header>

        <main class="flex-grow flex flex-col items-center justify-center px-4 py-12">
            <div class="relative flex flex-col items-center gap-16 max-w-xs w-full">
                <div class="absolute top-0 bottom-0 left-1/2 -translate-x-1/2 w-0 border-l-4 border-dashed border-gray-200 -z-10"></div>

                <!-- Nivel 1 -->
                <div class="flex flex-col items-center" style="transform: translateX(-56px);">
                    <button id="nodo-nivel-1" class="nodo-nivel bg-green-400" style="box-shadow: 0 6px 0 #3f9902;">
                        <i class="fa-solid fa-comments text-3xl text-white"></i>
                    </button>
                    <span class="mt-2 text-xs font-bold text-gray-500 uppercase tracking-wide">1. Frases y Números</span>
                </div>

                <!-- Nivel 2 -->
                <div class="flex flex-col items-center" style="transform: translateX(56px);">
                    <button id="nodo-nivel-2" class="nodo-nivel bg-sky-400" style="box-shadow: 0 6px 0 #1894ce;">
                        <i class="fa-solid fa-[#1cb0f6] fa-book-open text-3xl text-white"></i>
                    </button>
                    <span class="mt-2 text-xs font-bold text-gray-500 uppercase tracking-wide">2. Vocabulario</span>
                </div>

                <!-- Nivel 3 -->
                <div class="flex flex-col items-center" style="transform: translateX(-56px);">
                    <button id="nodo-nivel-3" class="nodo-nivel bg-purple-400" style="box-shadow: 0 6px 0 #7e22ce;">
                        <i class="fa-solid fa-layer-group text-3xl text-white"></i>
                    </button>
                    <span class="mt-2 text-xs font-bold text-gray-500 uppercase tracking-wide">3. Pares Texto</span>
                </div>

                <!-- Nivel 4 -->
                <div class="flex flex-col items-center" style="transform: translateX(56px);">
                    <button id="nodo-nivel-4" class="nodo-nivel bg-pink-400" style="box-shadow: 0 6px 0 #be185d;">
                        <i class="fa-solid fa-music text-3xl text-white"></i>
                    </button>
                    <span class="mt-2 text-xs font-bold text-gray-500 uppercase tracking-wide">4. Pares Audio</span>
                </div>
            </div>
        </main>
    </div>

    <!-- PANTALLA NIVEL 1 Y 2: PREGUNTAS (OPCIÓN MÚLTIPLE) -->
    <div id="pantalla-preguntas" class="hidden flex flex-col flex-grow">
        <header class="border-b-2 border-gray-200 p-4 sticky top-0 bg-white z-50">
            <div class="max-w-xl mx-auto flex items-center justify-between gap-4">
                <button onclick="mostrarMapa()" class="text-gray-400 hover:text-gray-600 text-2xl font-bold cursor-pointer">✕</button>
                <div class="w-full bg-gray-200 h-4 rounded-full overflow-hidden">
                    <div id="progress-bar-preguntas" class="bg-green-500 h-full w-0 transition-all duration-300 rounded-full"></div>
                </div>
                <div class="flex items-center gap-1 text-red-500 font-bold text-lg">
                    <i class="fa-solid fa-heart"></i>
                    <span id="lives-count">3</span>
                </div>
            </div>
        </header>

        <main class="flex-grow flex items-center justify-center p-4">
            <div class="max-w-md w-full text-center">
                <h2 class="text-2xl font-bold text-gray-700 mb-2">Selecciona la opción correcta</h2>
                
                <div class="flex items-center justify-center gap-4 my-8 bg-gray-50 p-6 rounded-2xl border-2 border-gray-200 relative">
                    <div class="bg-green-400 text-white p-4 rounded-full text-3xl shadow-inner">🐹</div>
                    <div class="bg-white border-2 border-gray-200 rounded-xl p-3 shadow-sm relative after:content-[''] after:absolute after:top-1/2 after:-left-2 after:-mt-2 after:border-t-8 after:border-t-transparent after:border-r-8 after:border-r-gray-200 after:border-b-8 after:border-b-transparent">
                        <p id="phrase-to-translate" class="text-xl font-semibold text-gray-700"></p>
                    </div>
                </div>

                <div id="options-container" class="grid grid-cols-1 gap-3 mb-8"></div>
            </div>
        </main>

        <footer id="footer-bar-preguntas" class="border-t-2 border-gray-200 p-6 bg-white sticky bottom-0">
            <div class="max-w-xl mx-auto flex justify-between items-center">
                <div id="feedback-message" class="hidden flex items-center gap-3">
                    <div id="feedback-icon" class="text-xl rounded-full w-12 h-12 flex items-center justify-center text-white fa-solid leading-none"></div>
                    <div>
                        <p id="feedback-title" class="font-bold text-lg"></p>
                        <p id="feedback-subtitle" class="text-sm"></p>
                    </div>
                </div>
                <div id="spacer" class="flex-grow"></div>
                <button id="action-btn" onclick="checkAnswer()" class="btn-duo btn-gray bg-gray-200 text-gray-400 font-bold py-3 px-8 rounded-xl uppercase tracking-wider text-sm w-full sm:w-auto disabled:opacity-50" disabled>
                    Comprobar
                </button>
            </div>
        </footer>
    </div>

    <!-- PANTALLA NIVEL 3: RELACIONAR PARES EN TEXTO -->
    <div id="pantalla-pares" class="hidden flex flex-col flex-grow">
        <header class="p-4 max-w-xl w-full mx-auto flex items-center gap-4">
            <button onclick="mostrarMapa()" class="text-gray-500 hover:text-gray-300 text-2xl font-bold cursor-pointer">✕</button>
            <div class="w-full bg-[#37464f] h-4 rounded-full overflow-hidden">
                <div id="progress-bar-pares" class="bg-[#58cc02] h-full w-0 transition-all duration-300 rounded-full"></div>
            </div>
            <div class="flex items-center gap-1 text-[#ff4b4b] font-bold text-lg">
                <i class="fa-solid fa-heart"></i>
                <span id="lives-count-pares">3</span>
            </div>
        </header>

        <main class="flex-grow flex flex-col items-center justify-center px-6 max-w-xl w-full mx-auto">
            <h1 class="text-3xl font-extrabold tracking-wide text-[#f1f7fb] self-start mb-8 w-full">
                Selecciona los pares
            </h1>
            <div id="matrix-container" class="grid grid-cols-2 gap-3 w-full mb-12"></div>
        </main>

        <footer class="border-t-2 border-[#37464f] p-6 w-full max-w-xl mx-auto flex justify-center">
            <button id="footer-btn-pares" class="w-full bg-[#37464f] text-[#4b5a63] font-bold py-4 rounded-2xl uppercase tracking-wider text-base cursor-not-allowed" disabled>
                Comprobar
            </button>
        </footer>
    </div>

    <!-- PANTALLA NIVEL 4: PARES CON AUDIO -->
    <div id="pantalla-audio-pares" class="hidden flex flex-col flex-grow">
        <div class="ap-screen">
            <div class="ap-topbar">
                <button class="ap-close-btn" onclick="mostrarMapa()" aria-label="Cerrar">&times;</button>
                <div class="ap-progress-track"><div id="progress-fill-audio-pares" class="ap-progress-fill"></div></div>
                <div class="ap-hearts"><span class="ap-bolt">&#9889;</span> <span id="lives-count-audio-pares">3</span></div>
            </div>

            <h1 class="ap-title">Selecciona los pares</h1>

            <div class="ap-pairs" id="pairs-audio-pares"></div>

            <button class="ap-check-btn" id="check-btn-audio-pares" disabled>Comprobar</button>
        </div>
    </div>

    <!-- PANTALLA FINAL GLOBAL -->
    <div id="pantalla-final" class="hidden flex-grow flex items-center justify-center p-4 text-center"></div>

    <script>
        // DATA NIVEL 1: Frases y Números (1 al 10)
        const nivel1Data = [
            { pregunta: "Hola, ¿cómo estás?", opciones: ["allinllachu, imaynallam?", "rimaykullayki", "riqsikuyki"], correcta: "allinllachu, imaynallam?" },
            { pregunta: "Gracias por tu ayuda.", opciones: ["sulpayki", "sulpayki kachun", "añayki"], correcta: "sulpayki kachun" },
            { pregunta: "Buenos días", opciones: ["rimaykullayki", "sulpayki kachun", "añayki"], correcta: "rimaykullayki" },
            { pregunta: "¿Cómo se dice 1 en quechua?", opciones: ["huk", "kimsa", "iskay"], correcta: "huk" },
            { pregunta: "¿Qué número es 'huk'?", opciones: ["5", "10", "1"], correcta: "1" },
            { pregunta: "¿Cómo se dice 2 en quechua?", opciones: ["iskay", "chunka", "kimsa"], correcta: "iskay" },
            { pregunta: "¿Qué número es 'iskay'?", opciones: ["1", "10", "2"], correcta: "2" },
            { pregunta: "¿Cómo se dice 3 en quechua?", opciones: ["pichqa", "kimsa", "huk"], correcta: "kimsa" },
            { pregunta: "¿Qué número es 'kimsa'?", opciones: ["8", "10", "3"], correcta: "3" },
            { pregunta: "¿Cómo se dice 4 en quechua?", opciones: ["huk", "suqta", "tawa"], correcta: "tawa" },
            { pregunta: "¿Qué número es 'tawa'?", opciones: ["7", "6", "4"], correcta: "4" },
            { pregunta: "¿Cómo se dice 5 en quechua?", opciones: ["iskay", "qanchis", "pichqa"], correcta: "pichqa" },
            { pregunta: "¿Qué número es 'pichqa'?", opciones: ["5", "7", "2"], correcta: "5" },
            { pregunta: "¿Cómo se dice 6 en quechua?", opciones: ["huk", "suqta", "isqun"], correcta: "suqta" },
            { pregunta: "¿Qué número es 'suqta'?", opciones: ["6", "8", "2"], correcta: "6" },
            { pregunta: "¿Cómo se dice 7 en quechua?", opciones: ["suqta", "qanchis", "tawa"], correcta: "qanchis" },
            { pregunta: "¿Qué número es 'qanchis'?", opciones: ["4", "7", "1"], correcta: "7" },
            { pregunta: "¿Cómo se dice 8 en quechua?", opciones: ["pusaq", "iskay", "tawa"], correcta: "pusaq" },
            { pregunta: "¿Qué número es 'pusaq'?", opciones: ["6", "9", "8"], correcta: "8" },
            { pregunta: "¿Cómo se dice 9 en quechua?", opciones: ["isqun", "suqta", "tawa"], correcta: "isqun" },
            { pregunta: "¿Qué número es 'isqun'?", opciones: ["2", "9", "3"], correcta: "9" },
            { pregunta: "¿Cómo se dice 10 en quechua?", opciones: ["chunka", "pusaq", "kimsa"], correcta: "chunka" },
            { pregunta: "¿Qué número es 'chunka'?", opciones: ["10", "9", "4"], correcta: "10" }
        ];

        // DATA NIVEL 2: Vocabulario (Preguntas con 3 opciones)
        const nivel2Data = [
            { pregunta: "¿Cómo se dice cielo en quechua?", opciones: ["hanaq pacha", "yaku", "panti"], correcta: "hanaq pacha" },
            { pregunta: "¿Cómo se dice pan en quechua?", opciones: ["tanta", "miski", "kachi"], correcta: "tanta" }
        ];

        // DATA NIVEL 3: Relación de palabras sin audio
        const nivel3Data = [
            { id: 1, lang1: "mama", lang2: "mama" },
            { id: 2, lang1: "papa", lang2: " papan" },
            { id: 3, lang1: "hermano", lang2: "wawqi" },
             { id: 3, lang1: "hermana", lang2: " ñaña " }
        ];

        // DATA NIVEL 4: Pares con Audio
        const nivel4Data = [
            { id: 1, palabra: "nina-fuego",   audio: "audios/nina-fuego.ogg" },
            { id: 2, palabra: "wayra-viento", audio: "audios/wayra-viento.ogg" },
            { id: 3, palabra: "yaku-agua",    audio: "audios/yaku.ogg" },
            { id: 4, palabra: "miski-azucar", audio: "audios/miski.ogg" }
        ];

        // Variables de estado global
        let vidas = 3;
        let nivelMaximoDesbloqueado = 1;
        let bancoActual = [];
        let indexPreguntaActual = 0;
        let opcionSeleccionada = null;
        let estadoRespondido = false;

        // Variables Nivel 3 (Pares)
        let primerBotonSeleccionado = null;
        let paresEncontrados = 0;

        // Variables Nivel 4 (Pares con audio)
        let apSelectedAudio = null;
        let apSelectedWord = null;
        let apMatchedPairs = new Set();

        const nodosNivelData = [
            { n: 1, color: "bg-green-400", sombra: "0 6px 0 #3f9902", icono: "fa-comments" },
            { n: 2, color: "bg-sky-400",   sombra: "0 6px 0 #1894ce", icono: "fa-book-open" },
            { n: 3, color: "bg-purple-400",sombra: "0 6px 0 #7e22ce", icono: "fa-layer-group" },
            { n: 4, color: "bg-pink-400",  sombra: "0 6px 0 #be185d", icono: "fa-music" }
        ];

        function desbloquearHasta(numero) {
            if (numero > nivelMaximoDesbloqueado) nivelMaximoDesbloqueado = numero;
        }

        function actualizarNodosMapa() {
            nodosNivelData.forEach(item => {
                const btn = document.getElementById('nodo-nivel-' + item.n);
                if (!btn) return;
                const desbloqueado = item.n <= nivelMaximoDesbloqueado;
                if (desbloqueado) {
                    btn.className = "nodo-nivel " + item.color;
                    btn.style.boxShadow = item.sombra;
                    btn.style.opacity = "1";
                    btn.style.cursor = "pointer";
                    btn.onclick = () => abrirNivel(item.n);
                    btn.innerHTML = `<i class="fa-solid ${item.icono} text-3xl text-white"></i>`;
                } else {
                    btn.className = "nodo-nivel bg-gray-300";
                    btn.style.boxShadow = "0 6px 0 #c7cdd1";
                    btn.style.opacity = "0.85";
                    btn.style.cursor = "not-allowed";
                    btn.onclick = null;
                    btn.innerHTML = `<i class="fa-solid fa-lock text-2xl text-gray-500"></i>`;
                }
            });
        }

        function ocultarTodasLasPantallas() {
            document.getElementById('pantalla-mapa').classList.add('hidden');
            document.getElementById('pantalla-preguntas').classList.add('hidden');
            document.getElementById('pantalla-pares').classList.add('hidden');
            document.getElementById('pantalla-audio-pares').classList.add('hidden');
            document.getElementById('pantalla-final').classList.add('hidden');
        }

        function mostrarMapa() {
            ocultarTodasLasPantallas();
            document.getElementById('body-app').className = "bg-white font-sans text-gray-800 flex flex-col min-h-screen transition-colors duration-300";
            document.getElementById('pantalla-mapa').classList.remove('hidden');
            actualizarNodosMapa();
        }

        function abrirNivel(numero) {
            if (numero > nivelMaximoDesbloqueado) return;
            ocultarTodasLasPantallas();
            vidas = 3;

            if (numero === 1 || numero === 2) {
                document.getElementById('body-app').className = "bg-white font-sans text-gray-800 flex flex-col min-h-screen transition-colors duration-300";
                document.getElementById('pantalla-preguntas').classList.remove('hidden');
                bancoActual = (numero === 1) ? nivel1Data : nivel2Data;
                indexPreguntaActual = 0;
                iniciarJuegoPreguntas(numero);
            } else if (numero === 3) {
                document.getElementById('body-app').className = "text-white font-sans flex flex-col min-h-screen transition-colors duration-300 bg-[#131f24]";
                document.getElementById('pantalla-pares').classList.remove('hidden');
                paresEncontrados = 0;
                primerBotonSeleccionado = null;
                resetearFooterPares();
                inicializarMatrizPares();
            } else if (numero === 4) {
                document.getElementById('body-app').className = "text-white font-sans flex flex-col min-h-screen transition-colors duration-300 bg-[#131f24]";
                document.getElementById('pantalla-audio-pares').classList.remove('hidden');
                inicializarParesAudio();
            }
        }

        // --- SISTEMA DE PREGUNTAS (NIVEL 1 & NIVEL 2) ---
        let nivelPreguntaEnCurso = 1;
        function iniciarJuegoPreguntas(nivel) {
            nivelPreguntaEnCurso = nivel;
            if (indexPreguntaActual >= bancoActual.length) {
                desbloquearHasta(nivel + 1);
                abrirNivel(nivel + 1);
                return;
            }
            estadoRespondido = false;
            opcionSeleccionada = null;
            document.getElementById('lives-count').innerText = vidas;
            actualizarBarraPreguntas();
            resetearFooterPreguntas();

            const ejercicio = bancoActual[indexPreguntaActual];
            document.getElementById('phrase-to-translate').innerText = ejercicio.pregunta;
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            
            ejercicio.opciones.forEach(opcion => {
                const btn = document.createElement('button');
                btn.innerText = opcion;
                btn.className = "w-full text-left py-4 px-6 border-2 border-gray-200 rounded-xl font-medium text-gray-700 hover:bg-gray-50 transition-all text-base focus:outline-none cursor-pointer";
                btn.onclick = () => seleccionarOpcionPregunta(btn, opcion);
                container.appendChild(btn);
            });
        }

        function seleccionarOpcionPregunta(boton, valor) {
            if (estadoRespondido) return;
            document.querySelectorAll('#options-container button').forEach(b => {
                b.classList.remove('border-blue-400', 'bg-blue-50', 'text-blue-600');
                b.classList.add('border-gray-200', 'text-gray-700');
            });
            boton.classList.add('border-blue-400', 'bg-blue-50', 'text-blue-600');
            opcionSeleccionada = valor;

            const actionBtn = document.getElementById('action-btn');
            actionBtn.disabled = false;
            actionBtn.className = "btn-duo bg-green-500 text-white font-bold py-3 px-8 rounded-xl uppercase tracking-wider text-sm w-full sm:w-auto cursor-pointer";
            actionBtn.style.boxShadow = "0 4px 0 #3f9902";
        }

        function checkAnswer() {
            if (estadoRespondido) {
                indexPreguntaActual++;
                iniciarJuegoPreguntas(nivelPreguntaEnCurso);
                return;
            }
            estadoRespondido = true;
            const ejercicio = bancoActual[indexPreguntaActual];
            const footer = document.getElementById('footer-bar-preguntas');
            const feedback = document.getElementById('feedback-message');
            const feedbackIcon = document.getElementById('feedback-icon');
            const feedbackTitle = document.getElementById('feedback-title');
            const feedbackSubtitle = document.getElementById('feedback-subtitle');
            const actionBtn = document.getElementById('action-btn');

            feedback.classList.remove('hidden');

            if (opcionSeleccionada === ejercicio.correcta) {
                footer.className = "border-t-2 border-green-200 p-6 bg-green-100 sticky bottom-0";
                feedbackIcon.className = "bg-green-500 text-white text-xl rounded-full w-12 h-12 flex items-center justify-center fa-solid fa-check leading-none";
                feedbackTitle.innerText = "¡Excelente!";
                feedbackTitle.className = "font-bold text-lg text-green-700";
                feedbackSubtitle.className = "hidden";
            } else {
                vidas--;
                document.getElementById('lives-count').innerText = vidas;
                footer.className = "border-t-2 border-red-200 p-6 bg-red-100 sticky bottom-0";
                feedbackIcon.className = "bg-red-500 text-white text-xl rounded-full w-12 h-12 flex items-center justify-center fa-solid fa-xmark leading-none";
                feedbackTitle.innerText = "Solución correcta:";
                feedbackTitle.className = "font-bold text-lg text-red-700";
                feedbackSubtitle.innerText = ejercicio.correcta;

                if (vidas <= 0) { setTimeout(() => { mostrarPantallaFinal(false); }, 1000); return; }
            }
            actionBtn.innerText = "Continuar";
        }

        function resetearFooterPreguntas() {
            document.getElementById('footer-bar-preguntas').className = "border-t-2 border-gray-200 p-6 bg-white sticky bottom-0";
            document.getElementById('feedback-message').classList.add('hidden');
            const actionBtn = document.getElementById('action-btn');
            actionBtn.disabled = true;
            actionBtn.innerText = "Comprobar";
            actionBtn.className = "btn-duo btn-gray bg-gray-200 text-gray-400 font-bold py-3 px-8 rounded-xl uppercase tracking-wider text-sm w-full sm:w-auto";
            actionBtn.style.boxShadow = "0 4px 0 #e5e5e5";
        }

        function actualizarBarraPreguntas() {
            document.getElementById('progress-bar-preguntas').style.width = `${(indexPreguntaActual / bancoActual.length) * 100}%`;
        }

        // --- SISTEMA NIVEL 3: SELECCIONAR PARES TEXTO ---
        function mezclarArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function inicializarMatrizPares() {
            let listaPalabras = [];
            nivel3Data.forEach(par => {
                listaPalabras.push({ texto: par.lang1, parId: par.id });
                listaPalabras.push({ texto: par.lang2, parId: par.id });
            });
            listaPalabras = mezclarArray(listaPalabras);

            const container = document.getElementById('matrix-container');
            container.innerHTML = "";
            listaPalabras.forEach(item => {
                const btn = document.createElement('button');
                btn.innerText = item.texto;
                btn.dataset.parId = item.parId; 
                btn.className = "word-btn w-full py-4 px-4 bg-[#131f24] border-2 border-[#37464f] rounded-2xl font-bold text-lg text-[#e3edf3] cursor-pointer text-center shadow-[0_4px_0_#37464f]";
                btn.onclick = () => manejarSeleccionPares(btn);
                container.appendChild(btn);
            });
        }

        function manejarSeleccionPares(botonClickeado) {
            if (botonClickeado.classList.contains('opacity-20') || botonClickeado === primerBotonSeleccionado) return;

            if (!primerBotonSeleccionado) {
                primerBotonSeleccionado = botonClickeado;
                destacarBotonPares(botonClickeado, "azul");
                return;
            }

            if (primerBotonSeleccionado.dataset.parId === botonClickeado.dataset.parId) {
                destacarBotonPares(primerBotonSeleccionado, "verde");
                destacarBotonPares(botonClickeado, "verde");
                const b1 = primerBotonSeleccionado; const b2 = botonClickeado;
                setTimeout(() => { marcarComoEmparejado(b1); marcarComoEmparejado(b2); verificarFinJuegoPares(); }, 300);
            } else {
                vidas--;
                document.getElementById('lives-count-pares').innerText = vidas;
                destacarBotonPares(primerBotonSeleccionado, "rojo");
                destacarBotonPares(botonClickeado, "rojo");
                const b1 = primerBotonSeleccionado; const b2 = botonClickeado;
                setTimeout(() => { resetearBotonParesEstilo(b1); resetearBotonParesEstilo(b2); }, 400);
                if (vidas <= 0) {
                    setTimeout(() => { mostrarPantallaFinal(false); }, 1000);
                }
            }
            primerBotonSeleccionado = null;
        }

        function destacarBotonPares(btn, color) {
            if (color === "azul") btn.className = "word-btn w-full py-4 px-4 bg-[#183446] border-2 border-[#1cb0f6] rounded-2xl font-bold text-lg text-[#1cb0f6] text-center shadow-[0_4px_0_#1cb0f6]";
            if (color === "verde") btn.className = "word-btn w-full py-4 px-4 bg-[#223e1d] border-2 border-[#58cc02] rounded-2xl font-bold text-lg text-[#58cc02] text-center shadow-[0_4px_0_#58cc02]";
            if (color === "rojo") btn.className = "word-btn w-full py-4 px-4 bg-[#411b22] border-2 border-[#ff4b4b] rounded-2xl font-bold text-lg text-[#ff4b4b] text-center shadow-[0_4px_0_#ff4b4b]";
        }

        function resetearBotonParesEstilo(btn) {
            btn.className = "word-btn w-full py-4 px-4 bg-[#131f24] border-2 border-[#37464f] rounded-2xl font-bold text-lg text-[#e3edf3] cursor-pointer text-center shadow-[0_4px_0_#37464f]";
        }

        function marcarComoEmparejado(btn) {
            btn.className = "word-btn w-full py-4 px-4 bg-[#131f24] border-2 border-[#212f35] rounded-2xl font-bold text-lg text-[#37464f] opacity-20 text-center cursor-default pointer-events-none";
        }

        function resetearFooterPares() {
            document.getElementById('progress-bar-pares').style.width = "0%";
            document.getElementById('lives-count-pares').innerText = vidas;
            const footerBtn = document.getElementById('footer-btn-pares');
            footerBtn.disabled = true;
            footerBtn.innerText = "Comprobar";
            footerBtn.className = "w-full bg-[#37464f] text-[#4b5a63] font-bold py-4 rounded-2xl uppercase tracking-wider text-base cursor-not-allowed";
            footerBtn.onclick = null;
        }

        function verificarFinJuegoPares() {
            paresEncontrados++;
            document.getElementById('progress-bar-pares').style.width = `${(paresEncontrados / nivel3Data.length) * 100}%`;
            if (paresEncontrados === nivel3Data.length) {
                desbloquearHasta(4);
                const footerBtn = document.getElementById('footer-btn-pares');
                footerBtn.disabled = false;
                footerBtn.innerText = "Siguiente Nivel";
                footerBtn.className = "w-full bg-[#58cc02] text-white font-bold py-4 rounded-2xl uppercase tracking-wider text-base cursor-pointer shadow-[0_4px_0_#3f9902]";
                footerBtn.onclick = () => { abrirNivel(4); };
            }
        }

        // --- SISTEMA NIVEL 4: PARES CON AUDIO ---
        function barajarArray(array) {
            const copia = [...array];
            for (let i = copia.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copia[i], copia[j]] = [copia[j], copia[i]];
            }
            return copia;
        }

        function inicializarParesAudio() {
            apSelectedAudio = null;
            apSelectedWord = null;
            apMatchedPairs = new Set();
            vidas = 3;
            document.getElementById('lives-count-audio-pares').innerText = vidas;
            document.getElementById('progress-fill-audio-pares').style.width = "0%";

            const contenedor = document.getElementById('pairs-audio-pares');
            contenedor.innerHTML = "";

            const ordenAudios = barajarArray(nivel4Data);
            const ordenPalabras = barajarArray(nivel4Data);

            for (let i = 0; i < nivel4Data.length; i++) {
                const itemAudio = ordenAudios[i];
                const itemPalabra = ordenPalabras[i];

                const row = document.createElement('div');
                row.className = "ap-row";

                const audioTile = document.createElement('div');
                audioTile.className = "ap-tile ap-audio-tile";
                audioTile.dataset.pair = itemAudio.id;
                audioTile.dataset.type = "audio";
                audioTile.innerHTML = `
                    <span class="ap-play-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span>
                    <span class="ap-waveform"></span>
                    <audio src="${itemAudio.audio}" preload="none"></audio>
                `;

                const wordTile = document.createElement('div');
                wordTile.className = "ap-tile ap-word-tile";
                wordTile.dataset.pair = itemPalabra.id;
                wordTile.dataset.type = "word";
                wordTile.textContent = itemPalabra.palabra;

                row.appendChild(audioTile);
                row.appendChild(wordTile);
                contenedor.appendChild(row);
            }

            contenedor.querySelectorAll('.ap-waveform').forEach(wf => {
                for (let i = 0; i < 14; i++) {
                    const h = 6 + Math.round(Math.random() * 16);
                    const span = document.createElement('span');
                    span.style.height = h + "px";
                    wf.appendChild(span);
                }
            });

            contenedor.querySelectorAll('.ap-tile[data-type="audio"]').forEach(tile => {
                tile.addEventListener('click', () => manejarClickAudioPares(tile));
            });
            contenedor.querySelectorAll('.ap-tile[data-type="word"]').forEach(tile => {
                tile.addEventListener('click', () => manejarClickPalabraPares(tile));
            });

            const checkBtn = document.getElementById('check-btn-audio-pares');
            checkBtn.disabled = true;
            checkBtn.classList.remove('ap-active', 'ap-success');
            checkBtn.textContent = "Comprobar";
            checkBtn.onclick = () => {
                if (checkBtn.disabled) return;
                mostrarPantallaFinal(true);
            };
        }

        function manejarClickAudioPares(tile) {
            if (tile.classList.contains('ap-matched')) return;
            const audioEl = tile.querySelector('audio');
            if (audioEl) { audioEl.currentTime = 0; audioEl.play().catch(() => {}); }
            if (apSelectedAudio) apSelectedAudio.classList.remove('ap-selected');
            apSelectedAudio = tile;
            tile.classList.add('ap-selected');
            intentarEmparejarAudioPares();
        }

        function manejarClickPalabraPares(tile) {
            if (tile.classList.contains('ap-matched')) return;
            if (apSelectedWord) apSelectedWord.classList.remove('ap-selected');
            apSelectedWord = tile;
            tile.classList.add('ap-selected');
            intentarEmparejarAudioPares();
        }

        function intentarEmparejarAudioPares() {
            if (!apSelectedAudio || !apSelectedWord) return;
            const esCorrecto = apSelectedAudio.dataset.pair === apSelectedWord.dataset.pair;
            const audioTile = apSelectedAudio;
            const wordTile = apSelectedWord;

            if (esCorrecto) {
                [audioTile, wordTile].forEach(t => {
                    t.classList.remove('ap-selected');
                    t.classList.add('ap-correct');
                    setTimeout(() => { t.classList.remove('ap-correct'); t.classList.add('ap-matched'); }, 400);
                });
                apMatchedPairs.add(audioTile.dataset.pair);
                document.getElementById('progress-fill-audio-pares').style.width =
                    Math.round((apMatchedPairs.size / nivel4Data.length) * 100) + "%";

                const listo = apMatchedPairs.size === nivel4Data.length;
                const checkBtn = document.getElementById('check-btn-audio-pares');
                checkBtn.disabled = !listo;
                checkBtn.classList.toggle('ap-active', listo);
            } else {
                [audioTile, wordTile].forEach(t => t.classList.add('ap-wrong'));
                vidas--;
                document.getElementById('lives-count-audio-pares').innerText = vidas;
                setTimeout(() => {
                    [audioTile, wordTile].forEach(t => t.classList.remove('ap-selected', 'ap-wrong'));
                }, 700);
                if (vidas <= 0) {
                    setTimeout(() => { mostrarPantallaFinal(false); }, 900);
                }
            }

            apSelectedAudio = null;
            apSelectedWord = null;
        }

        // --- PANTALLA FINAL GLOBAL ---
        function mostrarPantallaFinal(gano) {
            ocultarTodasLasPantallas();
            document.getElementById('body-app').className = "bg-white font-sans text-gray-800 flex flex-col min-h-screen";
            const finalContainer = document.getElementById('pantalla-final');
            finalContainer.classList.remove('hidden');
            
            if (gano) {
                finalContainer.innerHTML = `
                    <div class="text-center p-6 max-w-sm mx-auto">
                        <span class="text-6xl">🏆</span>
                        <h1 class="text-3xl font-bold text-green-500 my-4">¡Curso Completado!</h1>
                        <p class="text-gray-600 mb-6">Has completado los 4 niveles con éxito.</p>
                        <button onclick="mostrarMapa()" class="btn-duo bg-green-500 text-white font-bold py-3 px-6 rounded-xl uppercase w-full cursor-pointer">Volver al mapa</button>
                    </div>`;
            } else {
                finalContainer.innerHTML = `
                    <div class="text-center p-6 max-w-sm mx-auto">
                        <span class="text-6xl">😢</span>
                        <h1 class="text-3xl font-bold text-red-500 my-4">Te quedaste sin vidas</h1>
                        <p class="text-gray-600 mb-6">¡No te rindas! Inténtalo de nuevo.</p>
                        <button onclick="vidas = 3; mostrarMapa();" class="btn-duo bg-blue-500 text-white font-bold py-3 px-6 rounded-xl uppercase w-full cursor-pointer" style="box-shadow: 0 4px 0 #1d4ed8">Reintentar</button>
                    </div>`;
            }
        }

        window.onload = () => abrirNivel(1);
    </script>
</body>
</html>
